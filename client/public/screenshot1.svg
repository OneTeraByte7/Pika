<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#bd00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00e5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#00f2ff" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <!-- Main title -->
  <text x="640" y="280" font-family="Arial, sans-serif" font-size="88" 
        font-weight="900" text-anchor="middle" fill="url(#textGrad)">PIKA AI</text>
  
  <!-- Subtitle -->
  <text x="640" y="340" font-family="Arial, sans-serif" font-size="32" 
        text-anchor="middle" fill="white" opacity="0.8">Voice-First Social Media Agent</text>
  
  <!-- Features -->
  <text x="640" y="420" font-family="Arial, sans-serif" font-size="20" 
        text-anchor="middle" fill="#00f2ff" opacity="0.9">⚡ One Voice • All Platforms • Zero Switching</text>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="150" r="3" fill="#00f2ff" opacity="0.6"/>
  <circle cx="1080" cy="570" r="5" fill="#ff00e5" opacity="0.7"/>
  <circle cx="150" cy="550" r="2" fill="#bd00ff" opacity="0.5"/>
  <circle cx="1150" cy="120" r="4" fill="#00ff88" opacity="0.6"/>
</svg>